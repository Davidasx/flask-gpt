<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="icon"
        href="https://www.freelogovectors.net/wp-content/uploads/2023/01/chatgpt-logo-freelogovectors.net_.png"
        type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <div class="chat-container">
        <button id="settings-button" class="settings-button" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </button>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="message" placeholder="输入你的消息" onkeydown="checkEnter(event)" oninput="checkMessage()">
            <button id="send-button" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- Modal for settings -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSettings()">&times;</span>
            <h2>设置</h2>
            <h2>API设置</h2>
            <div class="input-group">
                <label for="base-url">Base URL:</label>
                <input type="text" id="base-url" placeholder="Base URL">
            </div>
            <div class="input-group">
                <label for="api-key">API Key:</label>
                <input type="text" id="api-key" placeholder="API Key">
            </div>
            <div class="button-container-end">
                <button id="ok-config-button" onclick="updateConfig();">保存</button>
            </div>
            <h2>聊天记录</h2>
            <div class="button-container-start">
                <button id="import-button" onclick="importMessages()">导入聊天记录</button>
                <button id="export-button" onclick="exportMessages()">导出聊天记录</button>
                <button id="clear-button" class="clear-button" onclick="clearMemory()">清空记忆</button>
            </div>
        </div>
    </div>

    <script src="static/scripts.js"></script>
</body>

</html>
