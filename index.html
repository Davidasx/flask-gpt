<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <title>ChatGPT</title>
    <link rel="icon"
        href="https://www.freelogovectors.net/wp-content/uploads/2023/01/chatgpt-logo-freelogovectors.net_.png"
        type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background-color: #fff;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-messages {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            border-bottom: 1px solid #ddd;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            flex-wrap: wrap;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .chat-input button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .chat-input button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .message.user img {
            margin-left: 10px;
            margin-right: 0;
        }

        .message .bubble {
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
            background-color: #f1f1f1;
            position: relative;
            white-space: pre-wrap;
            /* 保留换行符 */
        }

        .message.user .bubble {
            background-color: #007bff;
            color: #fff;
        }

        .message .bubble h1 {
            font-size: 2em;
            font-weight: bold;
        }

        .message .bubble h2 {
            font-size: 1.5em;
            font-weight: bold;
        }

        .message .bubble h3 {
            font-size: 1.17em;
            font-weight: bold;
        }

        .message .bubble h4 {
            font-size: 1em;
            font-weight: bold;
        }

        .message .bubble h5 {
            font-size: 0.83em;
            font-weight: bold;
        }

        .message .bubble h6 {
            font-size: 0.67em;
            font-weight: bold;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0, 0, 0);
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        /* New styles for buttons */
        .modal-content button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }

        .modal-content button:hover {
            background-color: #0056b3;
        }

        .modal-content button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .modal-content #cancel-config-button {
            background-color: #dc3545;
        }

        .modal-content #cancel-config-button:hover {
            background-color: #c82333;
        }

        /* Position settings button in the top-left corner */
        .settings-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        .settings-button i {
            font-size: 24px;
        }

        .modal-content .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <div class="chat-container">
        <button id="settings-button" class="settings-button" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </button>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="message" placeholder="输入你的消息" onkeydown="checkEnter(event)" oninput="checkMessage()">
            <button id="send-button" onclick="sendMessage()">发送</button>
            <button id="clear-button" onclick="clearMemory()">清空记忆</button>
        </div>
    </div>

    <!-- Modal for settings -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>设置</h2>
            <input type="text" id="base-url" placeholder="Base URL">
            <input type="text" id="api-key" placeholder="API Key">
            <div class="button-container">
                <button id="ok-config-button" onclick="updateConfig(); closeSettings();">确定</button>
                <button id="cancel-config-button" onclick="closeSettings()">取消</button>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    fetch('/config')
                        .then(response => response.json())
                        .then(data => {
                            document.getElementById('base-url').value = data.base_url || '';
                            document.getElementById('api-key').value = data.api_key || '';
                        });
                });
            </script>
        </div>
    </div>

    <script>
        // 预加载头像
        const userAvatar = new Image();
        userAvatar.src = "https://upload.wikimedia.org/wikipedia/commons/7/7c/User_font_awesome.svg";

        const botAvatar = new Image();
        botAvatar.src = "https://static.vecteezy.com/system/resources/previews/021/059/827/non_2x/chatgpt-logo-chat-gpt-icon-on-white-background-free-vector.jpg";

        function scrollToBottom() {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatMessage(message) {
            // 渲染标题
            message = message.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            message = message.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            message = message.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            message = message.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            message = message.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            message = message.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            message = message.replace(/\n{2,}/g, '\n');

            // 渲染代码块
            message = message.replace(/```([^```]+)```/gim, '<pre><code>$1</code></pre>');

            // 渲染行内代码
            message = message.replace(/`([^`]+)`/gim, '<code>$1</code>');

            // 渲染粗体文本
            message = message.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');

            // 渲染无序列表
            message = message.replace(/^\s*[-+*]\s+(.*)/gim, '<ul><li>$1</li></ul>');

            // 合并连续的列表项为一个列表
            message = message.replace(/<\/ul>\s*<ul>/gim, '');

            return message.trim();
        }

        function sendMessage(message = null, showUserBubble = true) {
            if (!message) {
                message = document.getElementById('message').value;
            }
            if (message.trim() === '') return;

            // 禁用发送按钮
            const sendButton = document.getElementById('send-button');
            sendButton.disabled = true;

            if (showUserBubble) {
                // 显示用户消息
                const userMessage = document.createElement('div');
                userMessage.className = 'message user';
                userMessage.innerHTML = `<div class="bubble">${formatMessage(message)}</div><img src="${userAvatar.src}" alt="User Avatar">`;
                document.getElementById('chat-messages').appendChild(userMessage);

                // 清空输入框
                document.getElementById('message').value = '';

                // 滚动到底部
                scrollToBottom();
            }

            fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            }).then(() => {
                const eventSource = new EventSource('/chat');

                let botMessage = null;
                let contentBuffer = '';

                eventSource.onmessage = function (event) {
                    const data = JSON.parse(event.data);
                    if (!botMessage) {
                        botMessage = document.createElement('div');
                        botMessage.className = 'message bot';
                        botMessage.innerHTML = `<img src="${botAvatar.src}" alt="ChatGPT Logo"><div class="bubble"></div>`;
                        document.getElementById('chat-messages').appendChild(botMessage);
                    }
                    contentBuffer += data.content;
                    botMessage.querySelector('.bubble').innerHTML = formatMessage(contentBuffer);

                    // 滚动到底部
                    scrollToBottom();

                    if (data.end) {
                        // 渲染消息内容
                        botMessage.querySelector('.bubble').innerHTML = formatMessage(contentBuffer);

                        // 渲染数学公式
                        MathJax.typesetPromise([botMessage.querySelector('.bubble')]).then(() => {
                            // 滚动到底部
                            scrollToBottom();
                        });

                        eventSource.close();
                    }
                };

                eventSource.onerror = function () {
                    console.error('Error occurred while receiving stream.');
                    eventSource.close();
                };
            });

            // 检查消息输入框
            checkMessage();
        }

        function clearMemory(confirmClear = true) {
            if (confirmClear && !confirm("确定要清空记忆吗？")) {
                return;
            }

            fetch('/clear', {
                method: 'POST'
            }).then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // 清空屏幕上的消息
                        const chatMessages = document.getElementById('chat-messages');
                        chatMessages.innerHTML = '';

                        // 发送一次回复
                        //sendMessage("你好！", false);
                    }
                });
        }

        function updateConfig() {
            const baseURL = document.getElementById('base-url').value;
            const apiKey = document.getElementById('api-key').value;

            fetch('/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ base_url: baseURL, api_key: apiKey })
            }).then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        
                    } else {
                        alert('配置更新失败');
                    }
                });
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function checkMessage() {
            const message = document.getElementById('message').value;
            const sendButton = document.getElementById('send-button');
            sendButton.disabled = message.trim() === '';
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = "block";
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = "none";
        }

        // 初始化时禁用发送按钮并清空记忆
        document.addEventListener('DOMContentLoaded', () => {
            checkMessage();
            clearMemory(false);
        });

        // Close the modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('settings-modal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>

</html>
